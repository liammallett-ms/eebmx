<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAQ — Maroondah BMX Club / Eastfield Eagles</title>
<meta name="description" content="Frequently asked questions about racing, coaching, costs and gear at the Maroondah BMX Club — Eastfield Eagles." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --black: #0a0710;
    --black-2: #120c1c;
    --black-3: #1a1228;
    --purple: #7B35A8;
    --purple-bright: #B062E8;
    --green: #00FF94;
    --white: #ffffff;
    --grey: #8a7fa0;
    --grey-2: #c9bfdf;
    --border: rgba(176, 98, 232, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--black);
    color: var(--white);
    line-height: 1.55;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(123, 53, 168, 0.25), transparent 50%),
      radial-gradient(ellipse 60% 50% at 100% 30%, rgba(0, 255, 148, 0.08), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(176, 98, 232, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(176, 98, 232, 0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  /* Nav (simplified — back to home button + logo) */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10, 7, 16, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--white);
  }
  .logo-mark img {
    height: 52px;
    width: auto;
    display: block;
    filter: drop-shadow(0 0 16px rgba(123, 53, 168, 0.45));
  }
  .back-link {
    color: var(--grey-2);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--green); }
  .back-link::before {
    content: '←';
    transition: transform 0.2s;
  }
  .back-link:hover::before { transform: translateX(-3px); }

  /* Page header */
  .page-head {
    position: relative;
    z-index: 2;
    padding: 100px 40px 60px;
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
  }
  .page-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .page-eyebrow::before, .page-eyebrow::after {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--green);
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 9vw, 140px);
    line-height: 0.9;
    letter-spacing: -0.005em;
    margin-bottom: 24px;
  }
  .page-subtitle {
    color: var(--grey-2);
    font-size: 18px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Search bar */
  .search-wrap {
    max-width: 720px;
    margin: 60px auto 0;
    position: relative;
    z-index: 2;
  }
  .search-input {
    width: 100%;
    background: var(--black-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 56px 22px 56px;
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    transition: all 0.2s;
  }
  .search-input::placeholder { color: var(--grey); }
  .search-input:focus {
    outline: none;
    border-color: var(--purple-bright);
    background: var(--black-3);
    box-shadow: 0 0 0 4px rgba(176, 98, 232, 0.12);
  }
  .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--green);
    pointer-events: none;
    font-size: 18px;
  }
  .search-clear {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--black-3);
    border: 1px solid var(--border);
    color: var(--grey-2);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }
  .search-clear:hover { background: var(--purple); color: var(--white); }
  .search-clear.visible { display: inline-flex; }

  /* Categories */
  .faq-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 40px 120px;
    position: relative;
    z-index: 2;
  }
  .category {
    margin-bottom: 60px;
  }
  .category.hidden { display: none; }
  .category-head {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .category-icon {
    font-size: 28px;
    line-height: 1;
  }
  .category-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.02em;
  }
  .category-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--grey);
    text-transform: uppercase;
    margin-left: auto;
  }

  /* FAQ items */
  .faq-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .faq-item {
    background: var(--black-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .faq-item.hidden { display: none; }
  .faq-item:hover {
    border-color: rgba(176, 98, 232, 0.4);
  }
  .faq-item.open {
    border-color: var(--purple-bright);
    background: var(--black-3);
  }
  .faq-q {
    padding: 22px 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 16px;
    font-weight: 500;
    user-select: none;
    list-style: none;
  }
  .faq-q::-webkit-details-marker { display: none; }
  .faq-q-text { flex: 1; }
  .faq-q-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(176, 98, 232, 0.15);
    color: var(--purple-bright);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    flex-shrink: 0;
  }
  .faq-item.open .faq-q-icon {
    background: var(--green);
    color: var(--black);
    transform: rotate(45deg);
  }
  .faq-a {
    padding: 0 28px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1), padding 0.4s ease;
    color: var(--grey-2);
    font-size: 15px;
    line-height: 1.7;
  }
  .faq-item.open .faq-a {
    padding: 0 28px 24px;
    max-height: 600px;
  }
  .faq-a a {
    color: var(--green);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,255,148,0.3);
    transition: border-color 0.2s;
  }
  .faq-a a:hover { border-color: var(--green); }

  /* Highlight matched text */
  mark {
    background: rgba(0,255,148,0.2);
    color: var(--green);
    padding: 0 3px;
    border-radius: 3px;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--grey-2);
    font-size: 16px;
    display: none;
  }
  .no-results.visible { display: block; }
  .no-results::before {
    content: '🔍';
    display: block;
    font-size: 48px;
    margin-bottom: 20px;
    opacity: 0.4;
  }

  /* ===== Chat Widget ===== */
  .chat-launcher {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    background: var(--green);
    color: var(--black);
    border: none;
    border-radius: 999px;
    padding: 14px 22px 14px 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,255,148,0.3);
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .chat-launcher:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 40px rgba(0,255,148,0.3), 0 0 0 1px rgba(0,255,148,0.5);
  }
  .chat-launcher.hidden {
    transform: translateY(80px);
    opacity: 0;
    pointer-events: none;
  }
  .chat-launcher-icon {
    width: 28px;
    height: 28px;
    background: var(--black);
    color: var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 900;
  }

  .chat-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 380px;
    max-width: calc(100vw - 32px);
    max-height: 600px;
    height: calc(100vh - 80px);
    background: var(--black-2);
    border: 1px solid var(--purple-bright);
    border-radius: 20px;
    z-index: 200;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(176, 98, 232, 0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .chat-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .chat-header {
    padding: 20px 22px;
    background: linear-gradient(135deg, var(--purple) 0%, #4a1f6b 100%);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-header-text {
    flex: 1;
  }
  .chat-header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .chat-header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .chat-close {
    background: rgba(0,0,0,0.3);
    border: none;
    color: var(--white);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: background 0.2s;
  }
  .chat-close:hover { background: rgba(0,0,0,0.6); }

  .chat-search-wrap {
    padding: 14px 16px;
    background: var(--black-3);
    border-bottom: 1px solid var(--border);
  }
  .chat-search {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
  }
  .chat-search::placeholder { color: var(--grey); }
  .chat-search:focus {
    outline: none;
    border-color: var(--purple-bright);
  }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--purple) var(--black-2);
  }
  .chat-body::-webkit-scrollbar { width: 6px; }
  .chat-body::-webkit-scrollbar-track { background: var(--black-3); }
  .chat-body::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

  .chat-bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 10px;
    animation: bubbleIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .chat-bubble.bot {
    background: var(--black-3);
    border: 1px solid var(--border);
    color: var(--grey-2);
    border-top-left-radius: 4px;
  }
  .chat-bubble.user {
    background: var(--purple);
    color: var(--white);
    margin-left: auto;
    border-top-right-radius: 4px;
  }
  .chat-bubble strong { color: var(--white); }
  .chat-bubble a {
    color: var(--green);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,255,148,0.3);
  }

  .chat-categories {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }
  .chat-category-btn {
    background: var(--black-3);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 12px 16px;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
  }
  .chat-category-btn:hover {
    background: var(--purple);
    border-color: var(--purple-bright);
    transform: translateX(3px);
  }
  .chat-category-btn-icon { font-size: 18px; }
  .chat-category-btn-name { flex: 1; font-weight: 500; }
  .chat-category-btn-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--grey-2);
    letter-spacing: 0.1em;
  }

  .chat-q-btn {
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--grey-2);
    padding: 11px 14px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 6px;
    width: 100%;
    transition: all 0.15s;
  }
  .chat-q-btn:hover {
    border-color: var(--green);
    color: var(--white);
    background: var(--black-3);
  }
  .chat-q-btn mark {
    background: rgba(0,255,148,0.25);
    color: var(--green);
  }

  .chat-back-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--grey);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    transition: all 0.2s;
  }
  .chat-back-btn:hover { color: var(--green); border-color: var(--green); }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Boot loader */
  .boot-loader {
    position: fixed;
    inset: 0;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--green);
    text-transform: uppercase;
    transition: opacity 0.4s;
  }
  .boot-loader.hide { opacity: 0; pointer-events: none; }
  #app { opacity: 0; transition: opacity 0.4s; }
  #app.ready { opacity: 1; }

  /* Responsive */
  @media (max-width: 700px) {
    nav { padding: 14px 18px; }
    .logo-mark img { height: 44px; }
    .page-head { padding: 60px 22px 40px; }
    .search-wrap { margin-top: 36px; }
    .search-input { padding: 18px 50px 18px 50px; font-size: 15px; }
    .faq-body { padding: 50px 18px 100px; }
    .category-name { font-size: 28px; }
    .faq-q { padding: 18px 20px; font-size: 14px; }
    .faq-item.open .faq-a { padding: 0 20px 20px; }
    .chat-launcher { padding: 12px 18px 12px 14px; font-size: 13px; }
    .chat-panel {
      width: 100%;
      max-width: 100%;
      right: 0;
      bottom: 0;
      border-radius: 20px 20px 0 0;
      max-height: 80vh;
    }
  }
</style>
</head>
<body>

<div class="boot-loader" id="bootLoader">Loading FAQs…</div>

<div id="app">
  <nav>
    <a href="/" class="logo-mark" aria-label="Maroondah BMX Club — Eastfield Eagles">
      <img id="navLogo" src="/uploads/eagles-logo.png" alt="Eastfield Eagles">
    </a>
    <a href="/" class="back-link">Back to Home</a>
  </nav>

  <header class="page-head">
    <div class="page-eyebrow">Eagles Help Centre</div>
    <h1 class="page-title" id="pageTitle"></h1>
    <p class="page-subtitle" id="pageSubtitle"></p>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="searchInput" class="search-input" type="search" autocomplete="off">
      <button id="searchClear" class="search-clear" aria-label="Clear search">✕</button>
    </div>
  </header>

  <main class="faq-body" id="faqBody"></main>
  <div class="no-results" id="noResults"></div>

  <!-- Chat widget -->
  <button id="chatLauncher" class="chat-launcher" aria-label="Open FAQ assistant">
    <span class="chat-launcher-icon">?</span>
    <span id="chatLauncherLabel">Got questions?</span>
  </button>
  <div id="chatPanel" class="chat-panel" role="dialog" aria-labelledby="chatTitle">
    <div class="chat-header">
      <div class="chat-header-text">
        <div class="chat-header-title" id="chatTitle"></div>
        <div class="chat-header-sub" id="chatSub"></div>
      </div>
      <button id="chatClose" class="chat-close" aria-label="Close">×</button>
    </div>
    <div class="chat-search-wrap">
      <input id="chatSearch" class="chat-search" type="search" autocomplete="off" placeholder="Search…">
    </div>
    <div class="chat-body" id="chatBody"></div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // Highlight search matches in text
  function highlight(text, query) {
    if (!query) return esc(text);
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return esc(text).replace(re, '<mark>$1</mark>');
  }

  // ===== State =====
  let faqData = null;
  let chatView = 'home'; // 'home' | 'category' | 'answer' | 'search'
  let activeCategoryIndex = null;

  // ===== Render full FAQ page =====
  function renderFAQ(query = '') {
    const body = $('faqBody');
    const noResults = $('noResults');
    body.innerHTML = '';
    let totalMatches = 0;

    faqData.categories.forEach((cat, ci) => {
      const matchedQs = cat.questions.filter(q => {
        if (!query) return true;
        const hay = (q.question + ' ' + q.answer).toLowerCase();
        return hay.includes(query.toLowerCase());
      });
      if (matchedQs.length === 0 && query) return;

      totalMatches += matchedQs.length;
      const catEl = document.createElement('section');
      catEl.className = 'category';
      catEl.innerHTML = `
        <div class="category-head">
          <span class="category-icon">${esc(cat.icon || '•')}</span>
          <h2 class="category-name">${esc(cat.name)}</h2>
          <span class="category-count">${matchedQs.length} ${matchedQs.length === 1 ? 'question' : 'questions'}</span>
        </div>
        <div class="faq-list">
          ${matchedQs.map((q, qi) => `
            <div class="faq-item" data-cat="${ci}" data-q="${cat.questions.indexOf(q)}">
              <div class="faq-q">
                <span class="faq-q-text">${highlight(q.question, query)}</span>
                <span class="faq-q-icon">+</span>
              </div>
              <div class="faq-a">${highlight(q.answer, query).replace(/\n/g, '<br>')}</div>
            </div>
          `).join('')}
        </div>
      `;
      body.appendChild(catEl);
    });

    if (query && totalMatches === 0) {
      noResults.textContent = faqData.no_results_text || 'No questions matched.';
      noResults.classList.add('visible');
    } else {
      noResults.classList.remove('visible');
    }

    // Wire up accordion toggles
    body.querySelectorAll('.faq-item').forEach(item => {
      item.querySelector('.faq-q').addEventListener('click', () => {
        item.classList.toggle('open');
      });
    });
  }

  // ===== Chat widget rendering =====
  function renderChat() {
    const body = $('chatBody');
    body.innerHTML = '';

    if (chatView === 'home') {
      // Bot welcome bubble
      const welcome = document.createElement('div');
      welcome.className = 'chat-bubble bot';
      welcome.innerHTML = `Hi! I can help you find answers about racing, gear, costs and more. <strong>Pick a topic</strong> or search above.`;
      body.appendChild(welcome);

      // Category buttons
      const catList = document.createElement('div');
      catList.className = 'chat-categories';
      faqData.categories.forEach((cat, i) => {
        const btn = document.createElement('button');
        btn.className = 'chat-category-btn';
        btn.innerHTML = `
          <span class="chat-category-btn-icon">${esc(cat.icon || '•')}</span>
          <span class="chat-category-btn-name">${esc(cat.name)}</span>
          <span class="chat-category-btn-count">${cat.questions.length}</span>
        `;
        btn.addEventListener('click', () => openCategory(i));
        catList.appendChild(btn);
      });
      body.appendChild(catList);

    } else if (chatView === 'category') {
      const cat = faqData.categories[activeCategoryIndex];
      const back = document.createElement('button');
      back.className = 'chat-back-btn';
      back.textContent = '← Back to topics';
      back.addEventListener('click', () => { chatView = 'home'; renderChat(); });
      body.appendChild(back);

      const head = document.createElement('div');
      head.className = 'chat-bubble bot';
      head.innerHTML = `<strong>${esc(cat.icon)} ${esc(cat.name)}</strong> — pick a question:`;
      body.appendChild(head);

      cat.questions.forEach((q, qi) => {
        const btn = document.createElement('button');
        btn.className = 'chat-q-btn';
        btn.textContent = q.question;
        btn.addEventListener('click', () => showAnswer(activeCategoryIndex, qi));
        body.appendChild(btn);
      });

    } else if (chatView === 'answer') {
      const { ci, qi } = activeAnswer;
      const cat = faqData.categories[ci];
      const q = cat.questions[qi];

      const back = document.createElement('button');
      back.className = 'chat-back-btn';
      back.textContent = `← Back to ${cat.name}`;
      back.addEventListener('click', () => { chatView = 'category'; activeCategoryIndex = ci; renderChat(); });
      body.appendChild(back);

      const userBubble = document.createElement('div');
      userBubble.className = 'chat-bubble user';
      userBubble.textContent = q.question;
      body.appendChild(userBubble);

      const ans = document.createElement('div');
      ans.className = 'chat-bubble bot';
      ans.innerHTML = esc(q.answer).replace(/\n/g, '<br>');
      body.appendChild(ans);

      // suggest related questions in same category
      if (cat.questions.length > 1) {
        const suggest = document.createElement('div');
        suggest.className = 'chat-bubble bot';
        suggest.innerHTML = `Other questions in <strong>${esc(cat.name)}</strong>:`;
        body.appendChild(suggest);
        cat.questions.forEach((other, oi) => {
          if (oi === qi) return;
          const btn = document.createElement('button');
          btn.className = 'chat-q-btn';
          btn.textContent = other.question;
          btn.addEventListener('click', () => showAnswer(ci, oi));
          body.appendChild(btn);
        });
      }
    }
    body.scrollTop = body.scrollHeight;
  }

  function openCategory(i) {
    chatView = 'category';
    activeCategoryIndex = i;
    renderChat();
  }
  let activeAnswer = null;
  function showAnswer(ci, qi) {
    chatView = 'answer';
    activeAnswer = { ci, qi };
    renderChat();
  }

  // Chat search
  function chatSearch(query) {
    const body = $('chatBody');
    if (!query.trim()) {
      chatView = 'home';
      renderChat();
      return;
    }
    body.innerHTML = '';
    const back = document.createElement('button');
    back.className = 'chat-back-btn';
    back.textContent = '← Back to topics';
    back.addEventListener('click', () => { $('chatSearch').value = ''; chatView = 'home'; renderChat(); });
    body.appendChild(back);

    const matches = [];
    faqData.categories.forEach((cat, ci) => {
      cat.questions.forEach((q, qi) => {
        const hay = (q.question + ' ' + q.answer).toLowerCase();
        if (hay.includes(query.toLowerCase())) matches.push({ cat, ci, q, qi });
      });
    });

    if (matches.length === 0) {
      const none = document.createElement('div');
      none.className = 'chat-bubble bot';
      none.innerHTML = esc(faqData.chat_unanswered_message || "I don't have an answer for that. Try different words or email us.");
      body.appendChild(none);
      return;
    }

    const head = document.createElement('div');
    head.className = 'chat-bubble bot';
    head.innerHTML = `Found <strong>${matches.length}</strong> ${matches.length === 1 ? 'match' : 'matches'}:`;
    body.appendChild(head);

    matches.slice(0, 8).forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'chat-q-btn';
      btn.innerHTML = `${highlight(m.q.question, query)} <span style="display:block;font-size:10px;color:var(--grey);margin-top:4px;font-family:'JetBrains Mono',monospace;letter-spacing:0.15em;text-transform:uppercase;">${esc(m.cat.name)}</span>`;
      btn.addEventListener('click', () => showAnswer(m.ci, m.qi));
      body.appendChild(btn);
    });
  }

  // ===== Boot =====
  async function boot() {
    try {
      const res = await fetch('content/faq.json?t=' + Date.now());
      if (!res.ok) throw new Error('Failed to load FAQ content');
      faqData = await res.json();
    } catch (err) {
      $('bootLoader').textContent = 'Could not load FAQs. Try refreshing.';
      console.error(err);
      return;
    }

    // Try to load logo from site.json (best-effort)
    try {
      const siteRes = await fetch('content/site.json?t=' + Date.now());
      if (siteRes.ok) {
        const site = await siteRes.json();
        if (site.logo) $('navLogo').src = site.logo;
        document.title = `FAQ — ${site.title || 'Eastfield Eagles'}`;
      }
    } catch (_) { /* fine, fall back */ }

    // Headings & labels
    $('pageTitle').textContent = faqData.page_title || 'Frequently Asked Questions';
    $('pageSubtitle').textContent = faqData.page_subtitle || '';
    $('searchInput').placeholder = faqData.search_placeholder || 'Search questions…';
    $('chatLauncherLabel').textContent = faqData.chat_button_label || 'Got questions?';
    $('chatTitle').textContent = faqData.chat_panel_title || 'FAQ Bot';
    $('chatSub').textContent = faqData.chat_panel_subtitle || '';
    $('chatSearch').placeholder = faqData.search_placeholder || 'Search…';

    renderFAQ();
    renderChat();

    $('app').classList.add('ready');
    setTimeout(() => $('bootLoader').classList.add('hide'), 100);

    // Search wiring
    const searchInput = $('searchInput');
    const searchClear = $('searchClear');
    let searchTimer;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      const v = e.target.value.trim();
      searchClear.classList.toggle('visible', v.length > 0);
      searchTimer = setTimeout(() => renderFAQ(v), 100);
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      renderFAQ('');
      searchInput.focus();
    });

    // Chat widget wiring
    $('chatLauncher').addEventListener('click', () => {
      $('chatLauncher').classList.add('hidden');
      $('chatPanel').classList.add('open');
    });
    $('chatClose').addEventListener('click', () => {
      $('chatPanel').classList.remove('open');
      $('chatLauncher').classList.remove('hidden');
    });
    let chatTimer;
    $('chatSearch').addEventListener('input', (e) => {
      clearTimeout(chatTimer);
      chatTimer = setTimeout(() => chatSearch(e.target.value), 100);
    });
  }

  boot();
</script>
</body>
</html>
